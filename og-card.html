<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --a: #2563eb; --b: #f97316; --overlap: #10b981;
    --ink: #0f172a; --muted: #475569;
  }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background:
      radial-gradient(900px 500px at 78% 30%, #eafff5 0%, transparent 60%),
      radial-gradient(700px 500px at 12% 85%, #eef4ff 0%, transparent 55%),
      #ffffff;
    display: flex; align-items: center;
    padding: 76px;
    position: relative; overflow: hidden;
  }
  /* faint map grid */
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(#0f172a0a 1px, transparent 1px),
      linear-gradient(90deg, #0f172a0a 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(900px 600px at 70% 40%, #000 30%, transparent 75%);
  }
  .left { width: 600px; position: relative; z-index: 2; }
  .brand { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
  .glyph {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--a), var(--overlap));
    display: grid; place-items: center;
    box-shadow: 0 12px 28px -6px rgba(37,99,235,.55);
  }
  .glyph svg { width: 34px; height: 34px; stroke: #fff; fill: none; stroke-width: 2.5; }
  .brand .kicker { font-size: 19px; font-weight: 700; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  h1 { font-size: 76px; line-height: 1.02; font-weight: 800; color: var(--ink); letter-spacing: -.025em; }
  h1 .accent { color: var(--a); }
  p.sub { margin-top: 26px; font-size: 27px; line-height: 1.45; color: var(--muted); font-weight: 500; max-width: 540px; }
  .chips { margin-top: 34px; display: flex; gap: 12px; }
  .chip {
    font-size: 19px; font-weight: 600; padding: 10px 18px; border-radius: 999px;
    border: 1.5px solid #e2e8f0; color: var(--ink); background: #fff;
    display: flex; align-items: center; gap: 9px;
  }
  .chip .dot { width: 12px; height: 12px; border-radius: 50%; }
  .url { position: absolute; bottom: 54px; left: 76px; font-size: 20px; font-weight: 600; color: var(--a); z-index: 2; }

  /* right-side map motif: two reachability blobs + overlap */
  .map { position: absolute; right: 60px; top: 50%; transform: translateY(-50%); width: 470px; height: 470px; z-index: 1; }
  .blob { position: absolute; border-radius: 50%; filter: blur(.5px); }
  .blobA { width: 290px; height: 260px; left: 20px; top: 90px; background: rgba(37,99,235,.22); border: 3px solid rgba(37,99,235,.55); border-radius: 48% 52% 55% 45%; }
  .blobB { width: 290px; height: 260px; right: 10px; top: 130px; background: rgba(249,115,22,.20); border: 3px solid rgba(249,115,22,.55); border-radius: 55% 45% 48% 52%; }
  .blobO { width: 150px; height: 150px; left: 160px; top: 160px; background: rgba(16,185,129,.42); border: 3px solid rgba(16,185,129,.85); border-radius: 50% 50% 52% 48%; box-shadow: 0 0 40px rgba(16,185,129,.4); }
  .pin { position: absolute; width: 30px; height: 30px; }
  .pin div { width: 30px; height: 30px; border: 4px solid #fff; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 6px 14px -2px rgba(15,23,42,.5); }
  .pinA { left: 70px; top: 150px; } .pinA div { background: var(--a); }
  .pinB { right: 60px; top: 195px; } .pinB div { background: var(--b); }
</style>
</head>
<body>
  <div class="left">
    <div class="brand">
      <div class="glyph">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7-6.3-7-11a7 7 0 1 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      </div>
      <div class="kicker">Meet in the Middle</div>
    </div>
    <h1>Where should you two <span class="accent">live</span>?</h1>
    <p class="sub">The neighbourhoods you can both reach within your own commute — by transit or bike. Also a fair place to just meet.</p>
    <div class="chips">
      <div class="chip"><span class="dot" style="background:#2563eb"></span>You</div>
      <div class="chip"><span class="dot" style="background:#f97316"></span>Them</div>
      <div class="chip"><span class="dot" style="background:#10b981"></span>Both</div>
    </div>
  </div>

  <div class="map">
    <div class="blob blobA"></div>
    <div class="blob blobB"></div>
    <div class="blob blobO"></div>
    <div class="pin pinA"><div></div></div>
    <div class="pin pinB"><div></div></div>
  </div>

  <div class="url">louis-josso.github.io/CityDistance</div>
</body>
</html>
