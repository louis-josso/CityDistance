<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meet in the Middle · Group</title>
  <meta name="description" content="Find where a group of people can all meet within a fair travel time, by transit or bike." />

  <!-- Social sharing preview (Open Graph + Twitter Card). Reuses og-image.png. -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://louis-josso.github.io/CityDistance/group.html" />
  <meta property="og:title" content="Meet in the Middle (group)" />
  <meta property="og:description" content="Find where a group of people can all meet within a fair travel time, by transit or bike." />
  <meta property="og:image" content="https://louis-josso.github.io/CityDistance/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Meet in the Middle (group)" />
  <meta name="twitter:description" content="Find where a group of people can all meet within a fair travel time, by transit or bike." />
  <meta name="twitter:image" content="https://louis-josso.github.io/CityDistance/og-image.png" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --a: #2563eb;          /* first person / accent */
      --overlap: #10b981;    /* everyone */
      --a-soft: #eff4ff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e8edf3;
      --panel: rgba(255, 255, 255, 0.72);
      --shadow: 0 10px 40px -8px rgba(15, 23, 42, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    #map { position: absolute; inset: 0; z-index: 0; background: #eaeef3; }

    /* ---- Panel ---- */
    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      width: 320px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      overflow: auto;
      background: var(--panel);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .brand .glyph {
      width: 30px; height: 30px; border-radius: 9px; flex: none;
      background: linear-gradient(135deg, var(--a), var(--overlap));
      display: grid; place-items: center;
      box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.5);
    }
    .brand .glyph svg { width: 17px; height: 17px; stroke: #fff; }
    h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
    .panel p.sub {
      margin: 10px 0 8px;
      font-size: 12.5px; color: var(--muted); line-height: 1.5;
    }
    .toplink { font-size: 10.5px; margin: 0 0 16px; }
    .toplink a { color: var(--a); text-decoration: none; font-weight: 500; }
    .toplink a:hover { text-decoration: underline; }

    /* ---- Person cards ---- */
    .person {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .person .row { display: flex; align-items: center; justify-content: space-between; }
    .person .name {
      font-size: 13px; font-weight: 600; color: var(--c);
      display: flex; align-items: center; gap: 8px;
    }
    .person .name .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--c); box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 18%, transparent);
    }
    .person .rgt { display: flex; align-items: center; gap: 6px; }
    .pill {
      font-size: 12px; font-weight: 700; color: var(--c);
      background: #fff; border: 1px solid var(--line);
      padding: 3px 9px; border-radius: 999px; font-variant-numeric: tabular-nums;
    }
    .remove {
      width: 20px; height: 20px; border-radius: 50%; flex: none;
      border: 1px solid var(--line); background: #fff; color: var(--muted);
      cursor: pointer; line-height: 1; font-size: 15px; padding: 0;
      display: grid; place-items: center; transition: all .12s;
    }
    .remove:hover { color: #dc2626; border-color: #fca5a5; }
    .remove[hidden] { display: none; }
    /* Mobile-only summary bits (hidden on desktop, where cards are always open) */
    .modemini, .chev { display: none; }
    .person input[type="range"] {
      width: 100%; margin: 12px 0 2px; accent-color: var(--c); cursor: pointer;
    }
    .person small { font-size: 10.5px; color: var(--muted); }
    /* ---- Per-person travel-mode toggle ---- */
    .modes { display: flex; gap: 4px; margin-top: 8px; }
    .modes button {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      background: #fff; border: 1px solid var(--line); border-radius: 8px;
      padding: 5px 6px; cursor: pointer; transition: all .12s;
    }
    .modes button svg { width: 14px; height: 14px; }
    .modes button:hover { border-color: var(--c); }
    .modes button[aria-pressed="true"] {
      color: var(--c); background: var(--soft);
      border-color: color-mix(in srgb, var(--c) 45%, transparent);
    }

    /* ---- Add-person button ---- */
    .addbtn {
      width: 100%; padding: 10px; margin-bottom: 4px;
      border: 1.5px dashed var(--line); border-radius: 12px;
      background: #fff; color: var(--muted);
      font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
      transition: all .12s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .addbtn svg { width: 15px; height: 15px; }
    .addbtn:hover { border-color: var(--a); color: var(--a); }
    .addbtn[hidden] { display: none; }

    .sharebtn {
      width: 100%; padding: 9px; margin: 2px 0;
      border: 1px solid var(--line); border-radius: 10px; background: #fff;
      color: var(--a); font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .12s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .sharebtn svg { width: 14px; height: 14px; }
    .sharebtn:hover { background: var(--a-soft); border-color: var(--a); }
    .sharebtn.copied { color: var(--overlap); border-color: var(--overlap); background: #ecfdf5; }

    /* ---- Key field ---- */
    .field { margin-top: 6px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .field input[type="text"] {
      width: 100%; padding: 9px 11px; border: 1px solid var(--line);
      border-radius: 10px; font-size: 12.5px; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input[type="text"]:focus { border-color: var(--a); box-shadow: 0 0 0 3px var(--a-soft); }

    /* ---- Status + hints ---- */
    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); margin-top: 14px;
      padding-top: 14px; border-top: 1px solid var(--line); min-height: 16px;
    }
    .status .spark { width: 8px; height: 8px; border-radius: 50%; background: var(--overlap); flex: none; }
    .status.error { color: #dc2626; }
    .status.error .spark { background: #dc2626; }
    .status.busy .spark { background: var(--a); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

    .hint { font-size: 10.5px; color: #9aa6b6; margin-top: 8px; line-height: 1.5; }
    .hint a { color: var(--a); text-decoration: none; font-weight: 500; }
    .hint a:hover { text-decoration: underline; }

    /* ---- Map markers / controls ---- */
    .leaflet-container { font-family: inherit; }
    .leaflet-control-zoom a {
      border: none !important; color: var(--ink) !important;
      background: var(--panel) !important;
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    .leaflet-bar { border: none !important; box-shadow: var(--shadow) !important; border-radius: 12px !important; overflow: hidden; }
    .pin-tip {
      background: var(--ink); color: #fff; border: none; border-radius: 8px;
      font-size: 11px; font-weight: 600; padding: 3px 8px; box-shadow: var(--shadow);
    }
    .pin-tip::before { border-top-color: var(--ink); }

    /* ---- City bar (top-centre) ---- */
    .citybar {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000; display: flex; align-items: center; gap: 6px;
      background: var(--panel);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 14px; box-shadow: var(--shadow);
      padding: 6px 8px 6px 10px; max-width: calc(100vw - 32px);
    }
    .citybar .pin-ico { width: 16px; height: 16px; color: var(--a); flex: none; }
    .citybar select {
      border: none; background: transparent; font-family: inherit;
      font-size: 13.5px; font-weight: 600; color: var(--ink);
      cursor: pointer; outline: none; padding: 5px 4px; max-width: 46vw;
    }
    .citybar button {
      flex: none; width: 32px; height: 32px; display: grid; place-items: center;
      background: #fff; border: 1px solid var(--line); border-radius: 9px;
      color: var(--ink); cursor: pointer; transition: background .15s;
    }
    .citybar button:hover { background: var(--a-soft); color: var(--a); }
    .citybar button svg { width: 16px; height: 16px; }

    /* Grab handle, shown only as a bottom sheet on phones */
    .sheet-handle { display: none; }

    /* ---- Mobile: dock the panel as a bottom sheet ---- */
    @media (max-width: 640px) {
      .panel {
        top: auto; left: 0; right: 0; bottom: 0;
        width: 100%; max-width: 100%;
        max-height: 64vh;
        border-radius: 22px 22px 0 0;
        border-bottom: none;
        padding: 8px 16px calc(16px + env(safe-area-inset-bottom, 0px));
      }
      .sheet-handle {
        display: block;
        width: 40px; height: 4px; border-radius: 999px;
        background: #cbd5e1; margin: 4px auto 12px;
      }
      .brand { margin-bottom: 2px; }
      .panel p.sub { margin: 8px 0 6px; }
      .person small { display: none; }

      /* ---- Mobile accordion: each person collapses to a tappable one-liner ---- */
      .person { margin-bottom: 8px; padding: 0; overflow: hidden; }
      .person .row {
        min-height: 48px; padding: 11px 14px; cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .modemini { display: inline; font-size: 14px; line-height: 1; }
      .chev {
        display: inline-block; width: 9px; height: 9px; margin-left: 4px;
        border-right: 2px solid var(--muted); border-bottom: 2px solid var(--muted);
        transform: rotate(45deg); transition: transform .15s;   /* points down = open */
      }
      .person input[type="range"] { margin: 4px 14px 2px; width: calc(100% - 28px); }
      .person .modes { margin: 8px 14px 12px; }
      .remove { width: 34px; height: 34px; font-size: 20px; }   /* bigger tap target */

      /* Collapsed: hide the body + remove, point the chevron right. */
      .person.collapsed input[type="range"],
      .person.collapsed .modes,
      .person.collapsed .remove { display: none; }
      .person.collapsed .chev { transform: rotate(-45deg); }
      /* When open, the mode glyph is redundant with the toggle below. */
      .person:not(.collapsed) .modemini { display: none; }

      /* Tap the handle / title to fold the sheet down to just the title */
      .sheet-handle { cursor: pointer; padding: 6px 0; margin: -2px auto 12px; }
      .brand { cursor: pointer; }
      .panel.collapsed { max-height: none; }
      .panel.collapsed .brand { margin-bottom: 0; }
      .panel.collapsed p.sub,
      .panel.collapsed .toplink,
      .panel.collapsed .people,
      .panel.collapsed .addbtn,
      .panel.collapsed .status { display: none; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="citybar">
    <svg class="pin-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6-5.3-6-10a6 6 0 1 1 12 0c0 4.7-6 10-6 10Z"/><circle cx="12" cy="11" r="2"/></svg>
    <select id="citySelect" aria-label="City"></select>
    <button id="locBtn" type="button" title="Use my location" aria-label="Use my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </button>
  </div>

  <div class="panel">
    <div class="sheet-handle"></div>
    <div class="brand">
      <span class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-6-5.3-6-10a6 6 0 1 1 12 0c0 4.7-6 10-6 10Z"/><circle cx="12" cy="11" r="2"/>
        </svg>
      </span>
      <h1>Meet in the Middle</h1>
    </div>
    <p class="sub">Add a pin for everyone (up to 5) and set how far each is willing to travel. The green zone is where you can <b>all</b> meet. 💚</p>
    <div class="toplink"><a href="index.html">← Just two people? Use the simpler version</a></div>

    <div class="people" id="people"></div>

    <button class="addbtn" id="addBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add a person
    </button>

    <button class="sharebtn" id="shareBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      Copy link to this map
    </button>

    <div class="field" id="keyField" style="display:none">
      <label>Geoapify API key</label>
      <input type="text" id="apiKey" placeholder="paste your free key" autocomplete="off" />
      <div class="hint">Free key (no card, 3000/day) at <a href="https://myprojects.geoapify.com/" target="_blank" rel="noopener">myprojects.geoapify.com</a>. Saved in this browser only.</div>
    </div>

    <div class="status" id="status"><span class="spark"></span><span id="statusText"></span></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"
    integrity="sha384-82q0nm29xZzIo5BMtDYnh2/NxeO6FoaK1S/0nF84w3cEsqbBfun3JdMyDVYWfVY5"
    crossorigin="anonymous"></script>

  <script>
    "use strict";

    const OVERLAP = "#10b981";
    const KEY_STORE = "geoapify_key";
    const CITY_STORE = "meet_city";   // last-picked city, shared across both pages

    // Up to 5 people. Each slot has a stable colour, taken on add, freed on
    // remove, so an existing pin never changes colour when someone else leaves.
    const MAX_POINTS = 5;
    const POINT_DEFS = [
      { color: "#2563eb", soft: "#eff4ff" },
      { color: "#f97316", soft: "#fff4ec" },
      { color: "#8b5cf6", soft: "#f5f3ff" },
      { color: "#db2777", soft: "#fdf2f8" },
      { color: "#0891b2", soft: "#ecfeff" },
    ];
    // Small offsets so freshly-added pins don't stack on the map centre.
    const OFFSETS = [
      [0.000, 0.000], [0.013, -0.022], [-0.013, 0.022], [0.015, 0.020], [-0.016, -0.018],
    ];

    const TRANSIT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="14" rx="2"/><path d="M4 11h16"/><path d="M8 21l2-3M16 21l-2-3"/><circle cx="8.5" cy="14" r=".5" fill="currentColor"/><circle cx="15.5" cy="14" r=".5" fill="currentColor"/></svg>';
    const BIKE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 100-2 1 1 0 000 2zM12 17.5L9 9h6l-3 8.5zM9 9l-2-2.5M15 9l3 8.5"/></svg>';

    // --- Analytics (Google Analytics 4) -------------------------------
    const GA_ID = "G-HTPHZHCN84";
    function track(name, params) {           // safe no-op until GA is configured
      if (window.gtag) window.gtag("event", name, params || {});
    }
    (function initGA() {
      if (!GA_ID || GA_ID === "G-XXXXXXXXXX") return;
      const s = document.createElement("script");
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(GA_ID);
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { window.dataLayer.push(arguments); };
      window.gtag("js", new Date());
      window.gtag("config", GA_ID);
    })();

    // --- API keys (injected at deploy; see deploy.yml) ----------------
    const HARDCODED_KEY = "";
    const INJECTED_KEY = "__GEOAPIFY_KEY__";
    const PLACEHOLDER = "__GEOAPIFY" + "_KEY__";
    const injectedKey = INJECTED_KEY === PLACEHOLDER ? "" : INJECTED_KEY;

    const INJECTED_KEYS = "__GEOAPIFY_KEYS__";
    const KEYS_PLACEHOLDER = "__GEOAPIFY" + "_KEYS__";
    const injectedKeys = INJECTED_KEYS === KEYS_PLACEHOLDER
      ? [] : INJECTED_KEYS.split(",").map((k) => k.trim()).filter(Boolean);

    const HARDCODED_KEYS = [
      // "your-first-key",
      // "your-second-key",
    ];

    // A locally-saved key (?key=… / localStorage) wins; otherwise the pool is
    // shuffled so load spreads and no one key is always hit first.
    function keyPool() {
      const saved = (localStorage.getItem(KEY_STORE) || "").trim();
      if (saved) return [saved];
      const pool = [...new Set(
        [...HARDCODED_KEYS, ...injectedKeys, HARDCODED_KEY, injectedKey]
          .flatMap((k) => (k || "").split(","))   // tolerate comma-lists in any source
          .map((k) => k.trim()).filter(Boolean)
      )];
      for (let i = pool.length - 1; i > 0; i--) {       // Fisher–Yates shuffle
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool;
    }

    // Non-linear time stops (fine low, coarse high). Slider is an index into it.
    const STOPS = [15, 20, 25, 30, 40, 50, 60];

    // --- State --------------------------------------------------------
    const POINTS = [];            // active people, in display order
    const usedColors = new Set(); // indexes into POINT_DEFS currently taken
    function takeColorDef() {
      for (let i = 0; i < POINT_DEFS.length; i++) if (!usedColors.has(i)) { usedColors.add(i); return i; }
      return 0;
    }

    // --- Map ----------------------------------------------------------
    const map = L.map("map", { zoomControl: true }).setView([52.5100, 13.4050], 11);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      maxZoom: 20,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);
    map.zoomControl.setPosition("topright");

    const polygonLayer = L.layerGroup().addTo(map);
    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const apiKeyEl = document.getElementById("apiKey");
    const peopleEl = document.getElementById("people");
    const addBtn = document.getElementById("addBtn");

    function setStatus(msg, kind) {
      statusText.textContent = msg || "";
      statusEl.classList.toggle("error", kind === "error");
      statusEl.classList.toggle("busy", kind === "busy");
    }

    function makeIcon(color) {
      return L.divIcon({
        className: "",
        html: `<div style="position:relative;width:24px;height:24px">
                 <div style="width:24px;height:24px;background:${color};border:3px solid #fff;
                      border-radius:50% 50% 50% 0;transform:rotate(-45deg);
                      box-shadow:0 4px 10px -1px rgba(15,23,42,.45)"></div>
                 <div style="position:absolute;top:8px;left:8px;width:8px;height:8px;
                      background:#fff;border-radius:50%"></div>
               </div>`,
        iconSize: [24, 24], iconAnchor: [12, 24]
      });
    }

    // --- Geoapify isoline ---------------------------------------------
    async function fetchIso(point) {
      const { lat, lng } = point.marker.getLatLng();
      const pool = keyPool();
      if (!pool.length) throw new Error("no API key");
      let lastErr = new Error("no API key");
      let keyIndex = 0;
      for (const apiKey of pool) {
        keyIndex++;
        const url = "https://api.geoapify.com/v1/isoline"
          + `?lat=${lat}&lon=${lng}`
          + `&type=time&mode=${point.mode}`
          + `&range=${point.minutes * 60}`
          + `&apiKey=${encodeURIComponent(apiKey)}`;
        const res = await fetch(url);
        if (res.ok) {
          const gj = await res.json();
          track("compute_reach", {
            person: POINTS.indexOf(point) + 1,
            people: POINTS.length,
            mode: point.mode,
            minutes: point.minutes,
            city: citySelect.value,
            key_index: keyIndex
          });
          return (gj.features && gj.features[0]) || null;
        }
        lastErr = new Error(`Geoapify ${res.status}`);
        if (res.status !== 429 && res.status !== 401 && res.status !== 403) throw lastErr;
      }
      throw lastErr;   // every key exhausted/rejected
    }

    let token = 0;
    async function recompute(point) {
      const mine = ++token;
      if (!keyPool().length) { setStatus("No API key configured.", "error"); return; }
      setStatus("Mapping reach…", "busy");
      try {
        point.iso = await fetchIso(point);
      } catch (e) {
        if (mine !== token) return;
        setStatus(`Couldn't fetch reach (${e.message}). Check the key / daily limit.`, "error");
        return;
      }
      if (mine !== token) return;
      redraw();
    }

    async function recomputeAll() {
      if (!keyPool().length) return;
      for (const p of POINTS) await recompute(p);   // sequential: avoids the redraw race
    }

    // --- Drawing ------------------------------------------------------
    function safeOp(fn, x, y) { try { return fn(x, y); } catch (e) { return null; } }

    // --- Pretty area drawing ------------------------------------------
    // Each area = a thin crisp outline + a thick BLURRED stroke clipped to the
    // shape's inside, which feathers the colour inward from the edge (a soft
    // inner gradient) while the centre stays clear. So five areas read as
    // glowing rings instead of muddy stacked fills; the shared zone is the only
    // strongly-filled region. The clip uses <use href> so it stays in sync as
    // Leaflet re-projects the path on zoom/pan.
    const SVGNS = "http://www.w3.org/2000/svg";
    let glowSeq = 0;
    function overlaySvg() { return map.getPanes().overlayPane.querySelector("svg"); }
    function glowDefs() {
      const svg = overlaySvg();
      let defs = svg.querySelector("defs.glowdefs");
      if (!defs) { defs = document.createElementNS(SVGNS, "defs"); defs.setAttribute("class", "glowdefs"); svg.insertBefore(defs, svg.firstChild); }
      return defs;
    }
    function clearGlowDefs() {
      const svg = overlaySvg();
      const defs = svg && svg.querySelector("defs.glowdefs");
      if (defs) defs.textContent = "";
    }

    function drawReach(feature, color, opts) {
      if (!feature) return;
      const o = opts || {};
      // Soft inner gradient: thick, blurred, clipped to the shape's inside.
      const glow = L.geoJSON(feature, {
        style: { color, weight: o.glowW || 26, opacity: o.glowO == null ? 0.5 : o.glowO, fill: false, lineCap: "round", lineJoin: "round" }
      }).addTo(polygonLayer);
      // Crisp thin edge (+ optional light fill), drawn on top.
      const top = L.geoJSON(feature, {
        style: {
          color: o.edge || color,
          weight: o.weight || 1.6,
          opacity: o.edgeO == null ? 0.95 : o.edgeO,
          fillColor: color,
          fillOpacity: o.fill || 0,
          lineJoin: "round"
        }
      }).addTo(polygonLayer);

      const topPath = top.getLayers()[0] && top.getLayers()[0].getElement();
      const glowPath = glow.getLayers()[0] && glow.getLayers()[0].getElement();
      if (topPath && glowPath) {
        const id = "reach" + (++glowSeq);
        topPath.setAttribute("id", id);
        const cp = document.createElementNS(SVGNS, "clipPath");
        cp.setAttribute("id", "clip" + id);
        const use = document.createElementNS(SVGNS, "use");
        use.setAttribute("href", "#" + id);
        use.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", "#" + id);
        cp.appendChild(use);
        glowDefs().appendChild(cp);
        glowPath.style.clipPath = "url(#clip" + id + ")";
        glowPath.style.filter = "blur(" + (o.blur || 6) + "px)";
        glowPath.style.pointerEvents = "none";
      }
    }

    function redraw() {
      polygonLayer.clearLayers();
      clearGlowDefs();
      glowSeq = 0;
      const ready = POINTS.filter((p) => p.iso);
      if (!ready.length) { setStatus("Drop a pin to see where you can get to."); return; }

      // One person: their reachable area IS the answer — give it a light fill.
      if (POINTS.length === 1) {
        drawReach(ready[0].iso, ready[0].color, { fill: 0.12 });
        setStatus("That's everywhere you can get to. Add people to find a zone that works for everyone.");
        return;
      }

      // Several people: each reach is a glowing outline (no fill) so they don't
      // muddy each other; the shared zone below is the only filled region.
      ready.forEach((p) => drawReach(p.iso, p.color, { fill: 0, glowW: 14, blur: 5 }));

      // Green overlap = intersection of EVERYONE's area (needs all pins ready).
      let overlap = null;
      if (ready.length === POINTS.length) {
        overlap = ready[0].iso;
        for (let i = 1; i < ready.length && overlap; i++) overlap = safeOp(turf.intersect, overlap, ready[i].iso);
        if (overlap) drawReach(overlap, OVERLAP, { fill: 0.45, edge: "#047857", weight: 2.5, glowO: 0.65, glowW: 52, blur: 11 });
      }

      if (ready.length < POINTS.length) {
        setStatus("Mapping everyone's reach…", "busy");
      } else {
        setStatus(overlap
          ? "💚 The green zone works for everyone — reachable by all."
          : "No shared zone yet — give people a bit more time, or drop a pin closer.");
      }
    }

    // --- Person cards (built dynamically) -----------------------------
    function buildCard(point) {
      const card = document.createElement("div");
      card.className = "person";
      card.style.setProperty("--c", point.color);
      card.style.setProperty("--soft", point.soft);
      card.innerHTML = `
        <div class="row">
          <span class="name"><span class="dot"></span> <span class="pname">Person</span></span>
          <span class="rgt">
            <span class="pill"><span class="val">15</span> min</span>
            <span class="modemini" aria-hidden="true">🚆</span>
            <button class="remove" type="button" title="Remove" aria-label="Remove">&times;</button>
            <span class="chev" aria-hidden="true"></span>
          </span>
        </div>
        <input type="range" min="0" max="6" step="1" value="0" />
        <div class="modes">
          <button data-mode="approximated_transit" aria-pressed="true">${TRANSIT_SVG} Transit</button>
          <button data-mode="bicycle" aria-pressed="false">${BIKE_SVG} Bike</button>
        </div>`;

      const range = card.querySelector('input[type="range"]');
      const val = card.querySelector(".val");
      const mini = card.querySelector(".modemini");
      const show = () => { val.textContent = STOPS[+range.value]; };
      range.addEventListener("input", show);
      range.addEventListener("change", () => { point.minutes = STOPS[+range.value]; recompute(point); });
      show();

      card.querySelectorAll(".modes button").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (point.mode === btn.dataset.mode) return;
          point.mode = btn.dataset.mode;
          card.querySelectorAll(".modes button").forEach((b) => b.setAttribute("aria-pressed", String(b === btn)));
          mini.textContent = point.mode === "bicycle" ? "🚲" : "🚆";   // mobile summary glyph
          recompute(point);
        });
      });

      card.querySelector(".remove").addEventListener("click", (e) => { e.stopPropagation(); removePoint(point); });

      // Mobile accordion: tapping the header row expands this person (and
      // collapses the others) or closes it again. Inert on desktop, where the
      // .collapsed class has no styling so every card stays fully open.
      card.querySelector(".row").addEventListener("click", (e) => {
        if (e.target.closest(".remove")) return;
        if (card.classList.contains("collapsed")) setExpanded(point);
        else card.classList.add("collapsed");
      });

      point.el = card;
      peopleEl.appendChild(card);
    }

    // Expand one person's card, collapse the rest (mobile accordion).
    function setExpanded(point) {
      POINTS.forEach((p) => p.el.classList.toggle("collapsed", p !== point));
    }

    // Re-number names + tooltips, and toggle add/remove affordances.
    function refreshControls() {
      POINTS.forEach((p, i) => {
        p.el.querySelector(".pname").textContent = `Person ${i + 1}`;
        if (p.marker) p.marker.setTooltipContent(`Person ${i + 1}`);
        p.el.querySelector(".remove").hidden = POINTS.length <= 1;
      });
      addBtn.hidden = POINTS.length >= MAX_POINTS;
    }

    // opts: { at, lat, lng, minutes, mode, compute } — lat/lng + minutes/mode are
    // used when restoring a shared link; otherwise a pin is dropped near centre.
    function addPoint(opts) {
      opts = opts || {};
      if (POINTS.length >= MAX_POINTS) return;
      const slot = POINTS.length;
      const defIndex = takeColorDef();
      const def = POINT_DEFS[defIndex];
      let pos;
      if (opts.lat != null && opts.lng != null) {
        pos = [opts.lat, opts.lng];
      } else {
        const c = opts.at || map.getCenter();
        const off = OFFSETS[slot] || [0, 0];
        pos = [c.lat + off[0], c.lng + off[1]];
      }

      const point = {
        defIndex, color: def.color, soft: def.soft,
        minutes: STOPS.includes(opts.minutes) ? opts.minutes : 15,
        mode: opts.mode || "approximated_transit",
        iso: null, marker: null, el: null
      };
      point.marker = L.marker(pos, { draggable: true, icon: makeIcon(point.color) }).addTo(map);
      point.marker.bindTooltip(`Person ${slot + 1}`, { className: "pin-tip", direction: "top", offset: [0, -22] });
      point.marker.on("dragend", () => recompute(point));

      POINTS.push(point);
      buildCard(point);
      syncCard(point);      // reflect minutes/mode in the controls (matters on restore)
      setExpanded(point);   // open the new card (mobile); inert on desktop
      refreshControls();
      if (opts.compute !== false) recompute(point);
    }

    // Push a point's minutes/mode into its card controls.
    function syncCard(point) {
      const card = point.el;
      const idx = STOPS.indexOf(point.minutes);
      const range = card.querySelector('input[type="range"]');
      if (idx >= 0) range.value = idx;
      card.querySelector(".val").textContent = point.minutes;
      card.querySelectorAll(".modes button").forEach((b) =>
        b.setAttribute("aria-pressed", String(b.dataset.mode === point.mode)));
      card.querySelector(".modemini").textContent = point.mode === "bicycle" ? "🚲" : "🚆";
    }

    function removePoint(point) {
      if (POINTS.length <= 1) return;
      map.removeLayer(point.marker);
      point.el.remove();
      usedColors.delete(point.defIndex);
      POINTS.splice(POINTS.indexOf(point), 1);
      refreshControls();
      track("remove_person", { people: POINTS.length });
      redraw();
    }

    addBtn.addEventListener("click", () => {
      addPoint();
      track("add_person", { people: POINTS.length });
    });

    // --- City picker --------------------------------------------------
    const COUNTRIES = [
      { country: "Belgium", flag: "🇧🇪", cities: [
        { name: "Brussels", lat: 50.8503, lon: 4.3517 },
      ] },
      { country: "France", flag: "🇫🇷", cities: [
        { name: "Nantes", lat: 47.2184, lon: -1.5536 },
        { name: "Paris", lat: 48.8566, lon: 2.3522 },
      ] },
      { country: "Germany", flag: "🇩🇪", cities: [
        { name: "Berlin", lat: 52.5200, lon: 13.4050 },
        { name: "Cologne", lat: 50.9375, lon: 6.9603 },
        { name: "Hamburg", lat: 53.5511, lon: 9.9937 },
        { name: "Munich", lat: 48.1351, lon: 11.5820 },
      ] },
      { country: "Lithuania", flag: "🇱🇹", cities: [
        { name: "Vilnius", lat: 54.6872, lon: 25.2797 },
      ] },
      { country: "Netherlands", flag: "🇳🇱", cities: [
        { name: "Amsterdam", lat: 52.3676, lon: 4.9041 },
      ] },
      { country: "Portugal", flag: "🇵🇹", cities: [
        { name: "Lisbon", lat: 38.7223, lon: -9.1393 },
      ] },
      { country: "Spain", flag: "🇪🇸", cities: [
        { name: "Barcelona", lat: 41.3874, lon: 2.1686 },
        { name: "Madrid", lat: 40.4168, lon: -3.7038 },
      ] },
      { country: "United Kingdom", flag: "🇬🇧", cities: [
        { name: "London", lat: 51.5074, lon: -0.1278 },
      ] },
    ];
    const CITIES = COUNTRIES.flatMap((g) => g.cities);

    const citySelect = document.getElementById("citySelect");
    const locBtn = document.getElementById("locBtn");
    COUNTRIES.forEach((g) => {
      const og = document.createElement("optgroup");
      og.label = `${g.flag} ${g.country}`;
      g.cities.forEach((c) => {
        const o = document.createElement("option");
        o.value = c.name; o.textContent = c.name;
        og.appendChild(o);
      });
      citySelect.appendChild(og);
    });
    citySelect.value = "Berlin";

    // Spread all current pins around the city centre, recentre, recompute.
    function goToCity(lat, lon, label, skipCompute) {
      POINTS.forEach((p, i) => {
        const off = OFFSETS[i] || [0, 0];
        p.marker.setLatLng([lat + off[0], lon + off[1]]);
      });
      map.setView([lat, lon], 12);
      setStatus(`${label} — drag each pin to a place.`);
      if (!skipCompute) recomputeAll();
    }

    citySelect.addEventListener("change", () => {
      const c = CITIES.find((x) => x.name === citySelect.value);
      if (c) { localStorage.setItem(CITY_STORE, c.name); track("select_city", { city: c.name }); goToCity(c.lat, c.lon, c.name); }
    });

    locBtn.addEventListener("click", () => {
      if (!navigator.geolocation) { setStatus("Location isn't available here.", "error"); return; }
      track("use_my_location", {});
      setStatus("Finding your location…", "busy");
      navigator.geolocation.getCurrentPosition(
        (pos) => goToCity(pos.coords.latitude, pos.coords.longitude, "Your area"),
        () => setStatus("Couldn't get your location.", "error")
      );
    });

    // Mobile: fold the sheet down to just the title.
    const panel = document.querySelector(".panel");
    const toggleSheet = () => panel.classList.toggle("collapsed");
    document.querySelector(".sheet-handle").addEventListener("click", toggleSheet);
    document.querySelector(".brand").addEventListener("click", toggleSheet);

    // Key resolution for the hidden field + ?key= local-testing fallback.
    apiKeyEl.value = localStorage.getItem(KEY_STORE) || HARDCODED_KEY || injectedKey;
    const urlKey = new URLSearchParams(location.search).get("key");
    if (urlKey) {
      localStorage.setItem(KEY_STORE, urlKey.trim());
      apiKeyEl.value = urlKey.trim();
    }

    // --- Shareable link -----------------------------------------------
    // Every person's pin + time + mode is encoded in the URL hash (out of the
    // query string, so it never carries the ?key=). Opening the link rebuilds
    // the group. Segments are pipe-separated: #p=lat,lng,min,mode|lat,lng,…
    const modeCode = (m) => (m === "bicycle" ? "b" : "t");
    const codeMode = (c) => (c === "b" ? "bicycle" : "approximated_transit");

    function shareURL() {
      const segs = POINTS.map((p) => {
        const ll = p.marker.getLatLng();
        return `${ll.lat.toFixed(5)},${ll.lng.toFixed(5)},${p.minutes},${modeCode(p.mode)}`;
      });
      return location.origin + location.pathname + "#p=" + segs.join("|");
    }

    function restoreFromHash() {
      const h = location.hash.replace(/^#/, "");
      if (!h) return false;
      const pstr = new URLSearchParams(h).get("p");
      if (!pstr) return false;
      const parsed = pstr.split("|").slice(0, MAX_POINTS).map((s) => {
        const a = s.split(",");
        return { lat: parseFloat(a[0]), lng: parseFloat(a[1]), minutes: parseInt(a[2], 10), mode: codeMode(a[3]) };
      }).filter((o) => !isNaN(o.lat) && !isNaN(o.lng));
      if (!parsed.length) return false;
      parsed.forEach((o) => addPoint({ lat: o.lat, lng: o.lng, minutes: o.minutes, mode: o.mode, compute: false }));
      const grp = L.featureGroup(POINTS.map((p) => p.marker));
      map.fitBounds(grp.getBounds().pad(0.35));
      return true;
    }

    const shareBtn = document.getElementById("shareBtn");
    shareBtn.addEventListener("click", async () => {
      const url = shareURL();
      const icon = shareBtn.querySelector("svg").outerHTML;
      const done = (msg, ok) => {
        shareBtn.innerHTML = icon + " " + msg;
        shareBtn.classList.toggle("copied", ok);
        setTimeout(() => { shareBtn.innerHTML = icon + " Copy link to this map"; shareBtn.classList.remove("copied"); }, 1900);
      };
      try {
        await navigator.clipboard.writeText(url);
        done("Link copied!", true);
        track("share_link", { people: POINTS.length });
      } catch (e) {
        location.hash = url.split("#")[1] || "";
        done("Link is in the address bar", false);
      }
    });

    // Restore a shared map (#p=…) if present; otherwise start with one person
    // and keep the city last picked on the other page.
    if (!restoreFromHash()) {
      addPoint({ compute: false });
      const savedCity = CITIES.find((x) => x.name === localStorage.getItem(CITY_STORE));
      if (savedCity) { citySelect.value = savedCity.name; goToCity(savedCity.lat, savedCity.lon, savedCity.name, true); }
    }
    setStatus("Drop a pin to see where you can get to.");
    (async () => {
      if (!keyPool().length) return;
      await recomputeAll();
    })();
  </script>
</body>
</html>
