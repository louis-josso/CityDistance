name: Deploy to GitHub Pages

# Publishes the site on every push to main, injecting the Geoapify API key
# from a repository secret (GEOAPIFY_KEY) so it never lives in the repo.
# Requires: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Geoapify API key
        run: |
          if [ -z "${{ secrets.GEOAPIFY_KEY }}" ]; then
            echo "::warning::GEOAPIFY_KEY secret is empty — published page will need a manually entered key."
          fi
          sed -i "s|__GEOAPIFY_KEY__|${{ secrets.GEOAPIFY_KEY }}|g" index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
